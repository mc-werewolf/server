name: Backup Prod Database

on:
  schedule:
    - cron: "0 19 * * *" # 19:00 UTC = 04:00 JST
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: werewolf-backup-prod
  cancel-in-progress: false

jobs:
  backup:
    uses: kairo-js/github-workflows/.github/workflows/postgres-backup.yml@main
    with:
      app-name: werewolf
      deploy-env-name: prod
      db-user: werewolf
      db-name: werewolf
      backup-prefix: werewolf-prod
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
      GDRIVE_DESTINATION: ${{ secrets.GDRIVE_DESTINATION }}
