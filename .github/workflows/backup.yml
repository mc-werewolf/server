name: Backup Prod Database

on:
  schedule:
    - cron: "0 19 * * *" # 19:00 UTC = 04:00 JST
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Dump prod PostgreSQL over SSH
        run: |
          set -eu
          FILENAME="werewolf-prod-$(date +%Y%m%dT%H%M%SZ).dump"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "docker exec ww-prod-postgres-1 pg_dump -U werewolf -Fc werewolf" > "$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          ls -lh "$FILENAME"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 30

      - name: Upload backup to Google Drive
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -eu
          curl -fsSL https://rclone.org/install.sh | sudo bash
          printf '%s' "$GDRIVE_SA_KEY" > /tmp/gdrive-sa.json
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [gdrive]
          type = drive
          service_account_file = /tmp/gdrive-sa.json
          root_folder_id = $GDRIVE_FOLDER_ID
          EOF
          rclone copy "$FILENAME" gdrive: --progress
          rm -f /tmp/gdrive-sa.json
