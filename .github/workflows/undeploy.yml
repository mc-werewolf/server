name: Undeploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which deployment environment to remove from the server.
        required: true
        type: choice
        default: all
        options:
          - all
          - dev
          - prod
      remove-volumes:
        description: Delete Docker volumes too. This deletes PostgreSQL data.
        required: true
        type: boolean
        default: false
      remove-app-dirs:
        description: Delete /opt/werewolf/<env> directories after compose down.
        required: true
        type: boolean
        default: true
      remove-caddy-snippet:
        description: Remove werewolf.caddy. Only applies when target is all.
        required: true
        type: boolean
        default: true
      confirm:
        description: Type exactly "undeploy werewolf".
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: werewolf-undeploy
  cancel-in-progress: false

jobs:
  undeploy-dev:
    if: ${{ inputs.target == 'all' || inputs.target == 'dev' }}
    uses: kairo-js/github-workflows/.github/workflows/app-undeploy.yml@v0.2.2
    with:
      app-name: werewolf
      deploy-env-names: dev
      remove-volumes: ${{ inputs.remove-volumes }}
      remove-app-dirs: ${{ inputs.remove-app-dirs }}
      remove-caddy-snippet: false
      confirm: ${{ inputs.confirm }}
    secrets:
      DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
      PROXY_HOST: ${{ secrets.PROXY_HOST }}
      PROXY_USER: ${{ secrets.PROXY_USER }}
      PROXY_SSH_KEY: ${{ secrets.PROXY_SSH_KEY }}

  undeploy-prod:
    if: ${{ inputs.target == 'all' || inputs.target == 'prod' }}
    uses: kairo-js/github-workflows/.github/workflows/app-undeploy.yml@v0.2.2
    with:
      app-name: werewolf
      deploy-env-names: prod
      remove-volumes: ${{ inputs.remove-volumes }}
      remove-app-dirs: ${{ inputs.remove-app-dirs }}
      remove-caddy-snippet: ${{ inputs.target == 'all' && inputs.remove-caddy-snippet || false }}
      confirm: ${{ inputs.confirm }}
    secrets:
      DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
      PROXY_HOST: ${{ secrets.PROXY_HOST }}
      PROXY_USER: ${{ secrets.PROXY_USER }}
      PROXY_SSH_KEY: ${{ secrets.PROXY_SSH_KEY }}
