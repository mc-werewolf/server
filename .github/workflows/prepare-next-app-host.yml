name: Prepare Next App Host

on:
  workflow_dispatch:
    inputs:
      deploy-env-name:
        description: Environment to prepare on NEXT_DEPLOY_HOST.
        required: true
        type: choice
        default: prod
        options:
          - prod
          - dev
      image-tag:
        description: Docker image tag to deploy to NEXT_DEPLOY_HOST. Use the current prod tag for prod.
        required: true
        type: string
      restore-database:
        description: Dump from current DEPLOY_HOST and restore into NEXT_DEPLOY_HOST.
        required: true
        type: boolean
        default: true
      confirm:
        description: Type exactly "prepare next host werewolf".
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: werewolf-prepare-next-${{ inputs.deploy-env-name }}
  cancel-in-progress: false

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          set -eu
          if [ "$CONFIRM" != "prepare next host werewolf" ]; then
            echo 'confirm must be exactly: prepare next host werewolf' >&2
            exit 1
          fi
          if [ -z "$IMAGE_TAG" ]; then
            echo "image-tag must not be empty." >&2
            exit 1
          fi

  dump-current-db:
    needs: validate-inputs
    if: ${{ inputs.restore-database }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV_NAME: ${{ inputs.deploy-env-name }}
      DB_USER: werewolf
      DB_NAME: werewolf
    steps:
      - name: Set up current host SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_current
          chmod 600 ~/.ssh/id_current
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Dump current database
        run: |
          set -eu
          FILENAME="werewolf-${DEPLOY_ENV_NAME}-before-host-move-$(date +%Y%m%dT%H%M%SZ).dump"
          ssh -i ~/.ssh/id_current -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /opt/werewolf/$DEPLOY_ENV_NAME && docker compose -p werewolf-$DEPLOY_ENV_NAME exec -T postgres pg_dump -U $DB_USER -Fc $DB_NAME" > "$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          ls -lh "$FILENAME"

      - name: Upload migration dump artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 30

  deploy-next:
    needs: [validate-inputs, dump-current-db]
    if: ${{ always() && needs.validate-inputs.result == 'success' && (needs.dump-current-db.result == 'success' || needs.dump-current-db.result == 'skipped') }}
    uses: kairo-js/github-workflows/.github/workflows/app-deploy.yml@v0.1.10
    with:
      app-name: werewolf
      image-prefix: mc-werewolf
      deploy-env-name: ${{ inputs.deploy-env-name }}
      image-tag: ${{ inputs.image-tag }}
      app-env: ${{ inputs.deploy-env-name }}
      backend-port: ${{ inputs.deploy-env-name == 'prod' && vars.NEXT_PROD_BACKEND_PORT || vars.NEXT_DEV_BACKEND_PORT }}
      frontend-port: ${{ inputs.deploy-env-name == 'prod' && vars.NEXT_PROD_FRONTEND_PORT || vars.NEXT_DEV_FRONTEND_PORT }}
      postgres-user: werewolf
      postgres-db: werewolf
      compose-path: deploy/docker-compose.yml
    secrets:
      DEPLOY_HOST: ${{ secrets.NEXT_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.NEXT_DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.NEXT_DEPLOY_SSH_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      POSTGRES_PASSWORD: ${{ inputs.deploy-env-name == 'prod' && secrets.PROD_POSTGRES_PASSWORD || secrets.DEV_POSTGRES_PASSWORD }}

  restore-next-db:
    needs: [dump-current-db, deploy-next]
    if: ${{ inputs.restore-database && needs.dump-current-db.result == 'success' && needs.deploy-next.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV_NAME: ${{ inputs.deploy-env-name }}
      DB_USER: werewolf
      DB_NAME: werewolf
    steps:
      - name: Download migration dump artifact
        uses: actions/download-artifact@v4
        with:
          pattern: werewolf-${{ inputs.deploy-env-name }}-before-host-move-*.dump
          merge-multiple: true

      - name: Set up next host SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.NEXT_DEPLOY_SSH_KEY }}" > ~/.ssh/id_next
          chmod 600 ~/.ssh/id_next
          ssh-keyscan -H "${{ secrets.NEXT_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Restore database on next host
        run: |
          set -eu
          DUMP_FILE="$(find . -maxdepth 1 -name "werewolf-${DEPLOY_ENV_NAME}-before-host-move-*.dump" | head -n 1)"
          if [ -z "$DUMP_FILE" ]; then
            echo "Migration dump artifact was not found." >&2
            exit 1
          fi
          ssh -i ~/.ssh/id_next -o StrictHostKeyChecking=yes \
            "${{ secrets.NEXT_DEPLOY_USER }}@${{ secrets.NEXT_DEPLOY_HOST }}" \
            "cd /opt/werewolf/$DEPLOY_ENV_NAME && docker compose -p werewolf-$DEPLOY_ENV_NAME stop backend frontend && docker compose -p werewolf-$DEPLOY_ENV_NAME exec -T postgres pg_restore -U $DB_USER -d $DB_NAME --clean --if-exists --no-owner && if [ -f docker-compose.ports.yml ]; then docker compose -p werewolf-$DEPLOY_ENV_NAME -f docker-compose.yml -f docker-compose.ports.yml up -d --wait --wait-timeout 90; else docker compose -p werewolf-$DEPLOY_ENV_NAME -f docker-compose.yml up -d --wait --wait-timeout 90; fi" < "$DUMP_FILE"

  verify-next:
    needs: [deploy-next, restore-next-db]
    if: ${{ always() && needs.deploy-next.result == 'success' && (needs.restore-next-db.result == 'success' || needs.restore-next-db.result == 'skipped') }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV_NAME: ${{ inputs.deploy-env-name }}
    steps:
      - name: Set up next host SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.NEXT_DEPLOY_SSH_KEY }}" > ~/.ssh/id_next
          chmod 600 ~/.ssh/id_next
          ssh-keyscan -H "${{ secrets.NEXT_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify app health on next host
        run: |
          set -eu
          ssh -i ~/.ssh/id_next -o StrictHostKeyChecking=yes \
            "${{ secrets.NEXT_DEPLOY_USER }}@${{ secrets.NEXT_DEPLOY_HOST }}" \
            "cd /opt/werewolf/$DEPLOY_ENV_NAME && docker compose -p werewolf-$DEPLOY_ENV_NAME exec -T backend wget -q -O - http://127.0.0.1:8000/api/health && docker compose -p werewolf-$DEPLOY_ENV_NAME exec -T backend wget -q -O - http://127.0.0.1:8000/api/health/db && docker compose -p werewolf-$DEPLOY_ENV_NAME exec -T frontend wget -q -O - http://127.0.0.1:3000/ >/dev/null"
