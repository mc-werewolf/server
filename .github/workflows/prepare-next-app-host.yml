name: Prepare Next App Host

on:
  workflow_dispatch:
    inputs:
      deploy-env-name:
        description: Environment to prepare on NEXT_DEPLOY_HOST.
        required: true
        type: choice
        default: prod
        options:
          - prod
          - dev
      image-tag:
        description: Docker image tag to deploy to NEXT_DEPLOY_HOST. Use the current prod tag for prod.
        required: true
        type: string
      restore-database:
        description: Dump from current DEPLOY_HOST and restore into NEXT_DEPLOY_HOST.
        required: true
        type: boolean
        default: true
      confirm:
        description: Type exactly "prepare next host werewolf".
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: werewolf-prepare-next-${{ inputs.deploy-env-name }}
  cancel-in-progress: false

jobs:
  prepare-next:
    uses: kairo-js/github-workflows/.github/workflows/app-prepare-next-host.yml@v0.1.13
    with:
      app-name: werewolf
      image-prefix: mc-werewolf
      deploy-env-name: ${{ inputs.deploy-env-name }}
      image-tag: ${{ inputs.image-tag }}
      restore-database: ${{ inputs.restore-database }}
      confirm: ${{ inputs.confirm }}
      postgres-user: werewolf
      postgres-db: werewolf
      compose-path: deploy/docker-compose.yml
      backend-port: ${{ inputs.deploy-env-name == 'prod' && vars.NEXT_PROD_BACKEND_PORT || vars.NEXT_DEV_BACKEND_PORT }}
      frontend-port: ${{ inputs.deploy-env-name == 'prod' && vars.NEXT_PROD_FRONTEND_PORT || vars.NEXT_DEV_FRONTEND_PORT }}
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      NEXT_DEPLOY_HOST: ${{ secrets.NEXT_DEPLOY_HOST }}
      NEXT_DEPLOY_USER: ${{ secrets.NEXT_DEPLOY_USER }}
      NEXT_DEPLOY_SSH_KEY: ${{ secrets.NEXT_DEPLOY_SSH_KEY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      POSTGRES_PASSWORD: ${{ inputs.deploy-env-name == 'prod' && secrets.PROD_POSTGRES_PASSWORD || secrets.DEV_POSTGRES_PASSWORD }}
