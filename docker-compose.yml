services:
  world-storage-init:
    image: alpine:3.19
    command: ["sh", "-c", "mkdir -p /data && chown -R 10001:10001 /data"]
    volumes:
      - world_data:/data
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-werewolf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-werewolf}
      POSTGRES_DB: ${POSTGRES_DB:-werewolf}
      KAIRO_REGISTRY_URL: ${KAIRO_REGISTRY_URL:-https://kairojs.com}
      LAUNCHER_ADDON_IDS: ${LAUNCHER_ADDON_IDS:-kairo,kairo-database}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-werewolf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      PORT: "8000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-werewolf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-werewolf}
      POSTGRES_DB: ${POSTGRES_DB:-werewolf}
      RELAY_PUBLIC_HOST: ${RELAY_PUBLIC_HOST:-127.0.0.1}
      KAIRO_REGISTRY_URL: ${KAIRO_REGISTRY_URL:-https://kairojs.com}
      LAUNCHER_ADDON_IDS: ${LAUNCHER_ADDON_IDS:-kairo,kairo-database}
      WORLD_STORAGE_DIR: /var/lib/werewolf/worlds
    volumes:
      - world_data:/var/lib/werewolf/worlds
    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "20000-20099:20000-20099/udp"
    depends_on:
      postgres:
        condition: service_healthy
      world-storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  world_data:
