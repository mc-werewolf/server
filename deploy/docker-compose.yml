services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KAIRO_REGISTRY_URL: ${KAIRO_REGISTRY_URL:-https://kairojs.com}
      LAUNCHER_ADDON_IDS: ${LAUNCHER_ADDON_IDS:-kairo,kairo-database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME}/${IMAGE_PREFIX}-backend:${IMAGE_TAG}
    container_name: ${APP_NAME}-${DEPLOY_ENV_NAME}-backend
    environment:
      APP_ENV: ${APP_ENV}
      PORT: "8000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      RELAY_PUBLIC_HOST: ${RELAY_PUBLIC_HOST:-167.179.74.58}
      KAIRO_REGISTRY_URL: ${KAIRO_REGISTRY_URL:-https://kairojs.com}
      LAUNCHER_ADDON_IDS: ${LAUNCHER_ADDON_IDS:-kairo,kairo-database}
      WORLD_STORAGE_DIR: /var/lib/werewolf/worlds
    volumes:
      - world_data:/var/lib/werewolf/worlds
    ports:
      - "20000-20099:20000-20099/udp"
    networks:
      - default
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    image: ${DOCKERHUB_USERNAME}/${IMAGE_PREFIX}-frontend:${IMAGE_TAG}
    container_name: ${APP_NAME}-${DEPLOY_ENV_NAME}-frontend
    environment:
      BACKEND_URL: http://${APP_NAME}-${DEPLOY_ENV_NAME}-backend:8000
    networks:
      - default
      - proxy
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  default:
  proxy:
    external: true
    name: proxy

volumes:
  postgres_data:
  world_data:
